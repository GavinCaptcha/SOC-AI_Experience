<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Name Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <section class="page-content" id="login-screen" role="main">
    <h1 class="project-title">
      What Does Your Professor Think of
      <span class="animated-term" id="animated-term">AI</span>
    </h1>
    <main class="login-box">
      <h2>Shall we find out together?</h2>
      <form class="name-form" id="name-form" action="#" method="post">
        <label for="name">Enter your name</label>
        <input id="name" name="name" type="text" placeholder="Your name" autocomplete="name" required />
        <button type="submit">Continue</button>
      </form>
    </main>
  </section>
  <section class="choice-screen hidden" id="choice-screen" aria-live="polite">
    <h2 class="choice-title">Choose a Path, <span id="user-name">Visitor</span></h2>
    <div class="journey-panel">
      <div class="journey-head">
        <p class="journey-label">Learning Journey</p>
        <p class="mana-count"><span id="mana-value">0</span>/100 Mana</p>
      </div>
      <div class="mana-track" aria-label="Learning progress">
        <div class="mana-fill" id="mana-fill"></div>
      </div>
    </div>
    <div class="choice-grid">
      <button class="choice-box progress-box" type="button" data-mana="25">Professor 1</button>
      <button class="choice-box progress-box" type="button" data-mana="25">Professor 2</button>
      <button class="choice-box progress-box" type="button" data-mana="25">Professor 3</button>
      <button class="choice-box progress-box" type="button" data-mana="25">Professor 4</button>
      <button class="choice-box unlock-box hidden" id="fifth-path" type="button">Final Insight</button>
    </div>
    <p class="journey-note" id="journey-note">Gather mana by exploring all four professor paths.</p>
  </section>
  <script src="script.js"></script>
</body>
</html>
